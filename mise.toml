[tools]
python = "3.12"

[tasks.sync]
description = "Sync generated repo metadata and skill listings"
run = "python scripts/check_repo.py --fix"

[tasks.check]
description = "Validate manifests, skills, and generated content"
run = "python scripts/check_repo.py"

[tasks.lint]
description = "Alias for check"
depends = ["check"]

[tasks.ci]
description = "Run the same validation used in CI"
depends = ["check"]

[tasks.smoke]
description = "Run local smoke tests for supported tools when installed"
run = "python scripts/smoke.py"

[tasks."release:prepare"]
description = "Update manifest versions for a release"
run = "python scripts/release_prepare.py"

[tasks.release]
description = "Prepare, tag, push, and publish a GitHub release"
run = "python scripts/release.py"

[tasks."hooks:install"]
description = "Install repo-local git hooks"
run = "git config core.hooksPath .githooks"
