# Reference sample for Goose extension setup.
# Adapt this into ~/.config/goose/config.yaml if you manage extensions via config file.
#
# Goose's documented config schema clearly supports stdio extensions.
# Remote Streamable HTTP installs are typically added via `goose configure`.
# Keep this sample aligned with the documented Kong endpoint and token name.

extensions:
  kong-konnect:
    enabled: true
    name: kong-konnect
    display_name: Kong Konnect
    description: Kong remote MCP server for Konnect workflows and shared skills.
    type: streamable_http
    url: https://us.mcp.konghq.com
    timeout: 300
    headers:
      Authorization: Bearer ${KONNECT_TOKEN}

